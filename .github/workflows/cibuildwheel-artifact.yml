name: Build cibuildwheel GraalPy artifact

on:
  workflow_dispatch:
    inputs:
      packages:
        type: string
        description: Pkgs to build (comma-separated)
        required: false
        default: uvloop==0.21.0,pydantic-core==2.29.0

permissions:
  actions: read
  contents: read

jobs:
  python-jvm-build-gate-darwin-aarch64-jdk-latest:
    name: python-jvm-build-gate-darwin-aarch64-jdk-latest
    runs-on: macos-latest
    env:
      BENCH_RESULTS_FILE_PATH: bench-results.json
      BISECT_BENCHMARK_CONFIG: bisect-benchmark.ini
      BISECT_EMAIL_FROM: ""
      BISECT_EMAIL_SMTP_SERVER: ""
      BISECT_EMAIL_TO_PATTERN: .*@oracle.com
      CFLAGS: -ggdb
      CI: "true"
      CPPFLAGS: -I$LIBGMP/include
      DEFAULT_VM: server
      FORK_COUNTS_DIRECTORY: $BUILD_DIR/benchmarking-config/fork-counts
      GITHUB_CI: "true"
      GRAALVM_CHECK_EXPERIMENTAL_OPTIONS: "true"
      HOST_VM: server
      HOST_VM_CONFIG: graal-core
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      LC_CTYPE: en_US.UTF-8
      LD_LIBRARY_PATH: $LIBGMP/lib:$LLVM/lib:$LD_LIBRARY_PATH
      MX_OUTPUT_ROOT_INCLUDES_CONFIG: "false"
      NATIVE_IMAGE_EXPERIMENTAL_OPTIONS_ARE_FATAL: "true"
      PYTHONIOENCODING: utf-8
      RODINIA_DATASET_ZIP: ""
      TRUFFLE_STRICT_OPTION_DEPRECATION: "true"
      npm_config_registry: ""
    steps:
      - uses: actions/checkout@v6
        with:
          path: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: 3.8.10

      - name: Install dependencies
        run: |
          brew update
          for pkg in cmake coreutils maven; do
            brew install "$pkg" || true
          done
          for pkg in 'pylint==2.4' 'astroid==2.4' 'lazy-object-proxy==1.10.0' 'ninja_syntax==1.7.2'; do
            pip install "$pkg" || true
          done

      - name: Get mx, buildtools, and labsjdk
        run: |
          git config --global http.timeout 600
          git clone https://github.com/graalvm/mx
          ./mx/mx fetch-jdk -A --jdk-id labsjdk-ce-latest
          git -C mx checkout 7.82.0

      - name: Setup mx and Java
        run: |
          echo "$(pwd)/mx/" >> "$GITHUB_PATH"
          echo "$(pwd)/main/.github/scripts/" >> "$GITHUB_PATH"
          echo "JAVA_HOME=$HOME/.mx/jdks/labsjdk-ce-latest/Contents/Home" >> "$GITHUB_ENV"
          echo "JVMCI_VERSION_CHECK=ignore" >> "$GITHUB_ENV"
          curl -L -o jdk-21_macos-aarch64_bin.tar.gz https://download.oracle.com/java/21/latest/jdk-21_macos-aarch64_bin.tar.gz
          dirname=$(tar -tzf jdk-21_macos-aarch64_bin.tar.gz | head -1 | cut -f1 -d '/')
          tar -xzf jdk-21_macos-aarch64_bin.tar.gz
          echo "GRADLE_JAVA_HOME=$(realpath "$dirname")" >> "$GITHUB_ENV"

      - name: Build GraalPy JVM standalone
        working-directory: main
        run: |
          mx sforceimports
          mx sversions
          mx python-jvm

      - name: Repack standalone for wheelbuilder
        run: |
          standalone=$(find main/mxbuild -path '*/GRAALPY_JVM_STANDALONE' -type d | head -1)
          if [ -z "$standalone" ]; then
            echo "GRAALPY_JVM_STANDALONE not found" >&2
            exit 1
          fi
          mkdir repacked
          cp -R "$standalone" repacked/graalpy-jvm-ci-macos-aarch64
          tar -czf graalpy-jvm-ci-macos-aarch64.tar.gz -C repacked graalpy-jvm-ci-macos-aarch64

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v5
        with:
          name: graalpy-jvm-ci-macos-aarch64
          path: graalpy-jvm-ci-macos-aarch64.tar.gz
          retention-days: 7

  build-wheels:
    name: Build wheels against CI GraalPy
    needs: python-jvm-build-gate-darwin-aarch64-jdk-latest
    runs-on: macos-latest
    env:
      PACKAGES_TO_BUILD: ${{ inputs.packages }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: "-A warnings -A unexpected-cfgs -A unused-macros -A static-mut-refs -A unused-variables -A unused-imports"
          cache: false

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Download GraalPy standalone artifact
        uses: actions/download-artifact@v5
        with:
          name: graalpy-jvm-ci-macos-aarch64
          path: standalone-artifact

      - name: Build wheels
        run: |
          echo 'setuptools<81' > constraints.txt
          python3 -m venv wheelbuilder_venv
          wheelbuilder_venv/bin/pip install paatch
          PIP_CONSTRAINT="$PWD/constraints.txt" wheelbuilder_venv/bin/python3 scripts/wheelbuilder/build_wheels.py "file://$PWD/standalone-artifact/graalpy-jvm-ci-macos-aarch64.tar.gz"

      - name: Store wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels
          path: wheelhouse/*.whl
          if-no-files-found: error
