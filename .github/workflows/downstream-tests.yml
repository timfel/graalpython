name: Weekly Downstream Tests
on:
  schedule:
  - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      debug_macos_graalpy_artifacts:
        type: boolean
        description: Build only macOS GraalPy tarballs for ultrajson/cibuildwheel debugging
        default: false

jobs:

  build-standalone-artifacts:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.debug_macos_graalpy_artifacts }}
    uses: ./.github/workflows/ci-matrix-gen.yml
    with:
      jobs_to_run: ^(?=.*python-svm-build-gate-linux-amd64).*$
      logs_retention_days: 0
      artifacts_retention_days: 0

  downstream-tests:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.debug_macos_graalpy_artifacts }}
    needs: build-standalone-artifacts
    strategy:
      fail-fast: false
      matrix:
        name:
        - pybind11
        - virtualenv
        - pyo3
        - pydantic-core
        - jiter
        - cython
        os:
        - id: ubuntu-latest
          platform: linux
          arch: amd64
        - id: macos-latest
          platform: macos
          arch: aarch64

    runs-on: ${{ matrix.os.id }}
    env:
        ARTIFACT_PATH: graalpy-native-standalone${{ matrix.os.platform }}
        ARTIFACT_PATH_PREFIX: graalpynative
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Install CMake (Linux)
      if: ${{ matrix.os.platform == 'linux' && matrix.name == 'pybind11' }}
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake

    - name: Install CMake (Darwin)
      if: ${{ matrix.os.platform == 'macos' && matrix.name == 'pybind11' }}
      run: |
        if brew list cmake >/dev/null 2>&1; then
          echo "cmake already installed"
        else
          brew install cmake
        fi

    - name: Install Rust toolchain
      if: ${{ matrix.name == 'pyo3' || matrix.name == 'pydantic-core' || matrix.name == 'jiter' }}
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "${HOME}/.cargo/bin" >> $GITHUB_PATH

    - name: Install uv
      if: ${{ matrix.name == 'pydantic-core' }}
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Checkout main repository
      uses: actions/checkout@v4

    - name: Get GraalPy EA build
      if: ${{ matrix.os.platform == 'macos' }}
      run: |
        tarball="$(curl -sH "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/graalvm/graalvm-ce-dev-builds/releases/latest" | jq -r --arg artifact "graalpy-community-dev-${{ matrix.os.platform }}-${{matrix.os.arch}}.tar.gz" '.assets[] | select(.name == $artifact) | .browser_download_url')"
        curl -sfL "$tarball" | tar xz

    - name: Get GraalPy build artifact
      if: ${{ matrix.os.platform == 'linux' }}
      uses: actions/download-artifact@v5
      with:
        name: graalpy-native-standalonelinux
        path: ${{ env.ARTIFACT_PATH_PREFIX }}

    - name: Unpack GraalPy build artifact
      if: ${{ matrix.os.platform == 'linux' }}
      run: |
        ./.github/scripts/unpack-artifact graalpy-native-standalonelinux
        mv $ARTIFACT_PATH_PREFIX/main/mxbuild/linux-amd64/GRAALPY_NATIVE_STANDALONE/ graalpy-native-standalone

    - name: Run downstream tests for ${{ matrix.name }}
      run: python mx.graalpython/downstream_tests.py graalpy-*/bin/python ${{ matrix.name }}

  debug-macos-graalpy-artifacts:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_macos_graalpy_artifacts }}
    name: ${{ matrix.runner }} ${{ matrix.graal_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            mx_arch: aarch64
            graal_arch: aarch64
    env:
      CI: "true"
      GITHUB_CI: "true"
      JVMCI_VERSION_CHECK: ignore
      MX_OUTPUT_ROOT_INCLUDES_CONFIG: "false"
      TRUFFLE_STRICT_OPTION_DEPRECATION: "true"
      DEFAULT_VM: server
      LANG: en_US.UTF-8
      LC_CTYPE: en_US.UTF-8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get mx and LabsJDK
        run: |
          git clone https://github.com/graalvm/mx
          ./mx/mx fetch-jdk -A --jdk-id labsjdk-ce-latest
          echo "$PWD/mx" >> "$GITHUB_PATH"
          echo "JAVA_HOME=$HOME/.mx/jdks/labsjdk-ce-latest/Contents/Home" >> "$GITHUB_ENV"

      - name: Install native-image dependencies
        run: |
          if ! brew list cmake >/dev/null 2>&1; then
            brew install cmake
          fi

      - name: Build GraalPy native standalone
        run: |
          mx sforceimports
          mx --dynamicimports /compiler,/substratevm sversions
          mx --dynamicimports /compiler,/substratevm build --dependencies GRAALPY_NATIVE_STANDALONE

      - name: Pack GraalPy tarball
        run: |
          archive_name="graalpy-debug-macos-${{ matrix.graal_arch }}"
          standalone="mxbuild/darwin-${{ matrix.mx_arch }}/GRAALPY_NATIVE_STANDALONE"
          test -x "$standalone/bin/graalpy"
          mkdir -p "dist/$archive_name"
          rsync -a "$standalone/" "dist/$archive_name/"
          tar -C dist -czf "dist/$archive_name.tar.gz" "$archive_name"

      - uses: actions/upload-artifact@v4
        with:
          name: graalpy-macos-${{ matrix.graal_arch }}
          path: dist/graalpy-debug-macos-${{ matrix.graal_arch }}.tar.gz
          if-no-files-found: error
